name: Main Config
version: 1.0.0
schema: v1
disableIndexing: false
embeddingsProvider:
  provider: ollama
  model: nomic-embed-text:latest
models:
  - name: Qwen2.5-Coder 14B
    provider: ollama
    model: qwen2.5-coder:14b
    useLegacyCompletionsEndpoint: false
    roles:
      - chat
      - edit
      - apply
    completionOptions:
      stop: ["<|im_end|>", "<|endoftext|>"]
      num_predict: 2048
    systemPrompt: "You are a local development assistant. Whenever a user asks to modify the project or fix a bug, always start your response by listing the exact, relative workspace file paths involved as raw text lines (e.g., 'src/components/File.tsx') so the user can Ctrl+Click to open them."
  - name: Llama 3.1 8B
    provider: ollama
    model: llama3.1:8b
    roles:
      - chat
  - name: Qwen2.5-Coder 1.5B
    provider: ollama
    model: qwen2.5-coder:1.5b-base
    roles:
      - autocomplete
  - name: Nomic Embed
    provider: ollama
    model: nomic-embed-text:latest
    roles:
      - embed
requestOptions:
  timeout: 60000
contextProviders:
  - name: codebase
    params: {}
  - name: search
  - name: files
  - name: currentFile
  - name: terminal
