name: Release

# Builds installers and attaches them to a draft GitHub Release whenever a
# version tag is pushed (e.g. `v0.2.1`, matching package.json's "version").
# The release is left as a draft — per project convention a Release is a
# public-facing action, so a human still reviews and publishes it by hand
# (gh release edit --draft=false, or the GitHub UI) rather than this
# workflow doing it unattended.
#
# No code-signing secrets are configured (neither a Windows cert nor an
# Apple Developer account exist yet), so these builds are unsigned, same as
# today's manual `npm run dist:win`/`dist:mac` + `gh release create` flow.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # electron-builder's `--publish always` creates the release if none exists
  # yet for the tag. Left to build-windows and build-mac themselves, both
  # jobs start from "release doesn't exist" and race to create it, landing
  # two duplicate draft releases with assets split across them (hit for
  # real on the v0.2.2 release — see TODO.md/COMPLETED.md). Creating it once
  # here, before either build starts, means both later jobs always find an
  # existing release to upload into instead.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --draft --title "$GITHUB_REF_NAME" --generate-notes

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --mac --universal --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
